name: Deploy static site to GitHub Pages

# Deploys the repo root (index.html + css/ + js/) to GitHub Pages.
# Runs on pushes to this branch and to main, plus manual dispatch.
on:
  push:
    branches:
      - main
      - claude/asset-management-website-ew5nt4
  workflow_dispatch:

# Permissions needed for the official Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enables Pages automatically if it isn't turned on yet.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
