<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    body{font-family:'Sarabun','Noto Sans Thai',sans-serif;margin:0}
    .btn{min-height:44px;display:inline-flex;align-items:center;justify-content:center;gap:.5rem;border-radius:.5rem;padding:0 1rem;font-weight:500;cursor:pointer;border:none;transition:.15s;font-size:.95rem}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-primary{background:#0f766e;color:#fff}.btn-primary:hover{background:#134e4a}
    .btn-secondary{background:#fff;color:#374151;border:1px solid #d1d5db}.btn-secondary:hover{background:#f9fafb}
    .btn-danger{background:#dc2626;color:#fff}.btn-danger:hover{background:#b91c1c}
    .input{width:100%;box-sizing:border-box;border:1px solid #d1d5db;border-radius:.5rem;padding:.5rem .75rem;min-height:44px;font-size:1rem;font-family:inherit}
    .input:focus{outline:none;border-color:#0f766e;box-shadow:0 0 0 1px #0f766e}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:.75rem;box-shadow:0 1px 2px rgba(0,0,0,.05)}
    .badge{display:inline-flex;align-items:center;border-radius:9999px;padding:.15rem .6rem;font-size:.75rem;font-weight:500}
    .label{display:block;font-size:.85rem;font-weight:500;color:#374151;margin-bottom:.25rem}
    .dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem}
    @media(min-width:768px){.dash-grid{grid-template-columns:repeat(4,1fr)}.overlay{align-items:center!important}.sheet{border-radius:1rem!important;max-height:88vh!important}}
    .pick:hover{background:#f9fafb}
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  <div id="app"></div>
  <div id="modal-root"></div>
  <div id="toast-root" style="position:fixed;top:1rem;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:.5rem;z-index:60;pointer-events:none"></div>

<script>
// ===================== state & helpers =====================
var state = { token:null, user:null, view:'login', params:{} };
try { state.token = localStorage.getItem('am_token'); } catch(e){}
var lcState = { outlet:null, items:[], signature:null };
var VIEWS = {};

function api(action, params){
  return new Promise(function(resolve, reject){
    var payload = JSON.stringify(Object.assign({ token: state.token }, params||{}));
    google.script.run
      .withSuccessHandler(function(r){ (r && r.ok) ? resolve(r.data) : reject(new Error(r ? r.error : 'ไม่มีการตอบกลับ')); })
      .withFailureHandler(function(e){ reject(e); })
      .apiCall(action, payload);
  });
}
function val(id){ var e=document.getElementById(id); return e ? e.value : ''; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function fmtDate(s){ if(!s) return '-'; var d=new Date(s); if(isNaN(d.getTime())) return '-'; return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear(); }
function fmtDateTime(s){ if(!s) return '-'; var d=new Date(s); if(isNaN(d.getTime())) return '-'; return fmtDate(s)+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }
function fmtBaht(n){ n=Number(n); if(isNaN(n)) return '-'; return '฿ '+n.toLocaleString('th-TH'); }
function fmtNum(n){ var x=Number(n); if(isNaN(x)) return esc(n==null?'-':n); return x.toLocaleString('th-TH'); }
function debounce(fn,ms){ var t; return function(){ var a=arguments,c=this; clearTimeout(t); t=setTimeout(function(){ fn.apply(c,a); }, ms||400); }; }
function outletName(o){ return (o.shop_name || o.name || o.id || '-'); }
function groupHoldings(holdings, order){
  var map={}; holdings.forEach(function(h){ (map[h.category]=map[h.category]||[]).push(h); });
  var cats=(order||[]).filter(function(c){ return map[c]; });
  Object.keys(map).forEach(function(c){ if(cats.indexOf(c)<0) cats.push(c); });
  return cats.map(function(c){ return {category:c, items:map[c]}; });
}

var L = {
  role:{technician:'ช่าง',admin:'แอดมิน',executive:'ผู้บริหาร'},
  logType:{issue:'เบิก/ยืม',transfer:'ย้ายร้าน',return:'คืนคลัง'},
  logStatus:{active:'กำลังยืม',returned:'คืนแล้ว',pending:'รออนุมัติ',approved:'อนุมัติแล้ว',rejected:'ไม่อนุมัติ',cancelled:'ยกเลิก'},
  logBadge:{active:'bg-green-100 text-green-800',returned:'bg-gray-100 text-gray-700',pending:'bg-amber-100 text-amber-800',approved:'bg-green-100 text-green-800',rejected:'bg-red-100 text-red-700',cancelled:'bg-red-100 text-red-700'},
  cond:{ok:'ปกติ',damaged:'ชำรุด',lost:'สูญหาย',missing:'หาไม่พบ'},
  condBadge:{ok:'bg-green-100 text-green-800',damaged:'bg-amber-100 text-amber-800',lost:'bg-red-100 text-red-700',missing:'bg-gray-100 text-gray-700'},
  outletStatus:{active:'ใช้งาน',inactive:'หยุดขาย',close:'ปิดกิจการ'},
  outletStatusBadge:{active:'bg-green-100 text-green-800',inactive:'bg-amber-100 text-amber-800',close:'bg-gray-100 text-gray-600'}
};

function toast(msg,kind){
  var c={success:'#16a34a',error:'#dc2626',info:'#1f2937'}[kind||'info'];
  var d=document.createElement('div');
  d.style.cssText='background:'+c+';color:#fff;padding:.5rem 1rem;border-radius:.5rem;box-shadow:0 4px 12px rgba(0,0,0,.15);font-size:.9rem;max-width:90%';
  d.textContent=msg; document.getElementById('toast-root').appendChild(d);
  setTimeout(function(){ d.remove(); }, 3500);
}
function setContent(html){ document.getElementById('content').innerHTML=html; }
function loading(){ setContent('<div style="text-align:center;padding:3rem;color:#9ca3af">กำลังโหลด...</div>'); }
function showError(err){ setContent('<div class="card" style="padding:1.5rem;text-align:center;color:#b91c1c;background:#fef2f2;border-color:#fecaca">เกิดข้อผิดพลาด: '+esc(err&&err.message?err.message:err)+'</div>'); }
function field(label,id,value,type){ return '<div style="flex:1"><label class="label">'+label+'</label><input class="input" id="'+id+'" type="'+(type||'text')+'" value="'+esc(value==null?'':value)+'"></div>'; }
function section(title,inner){ return '<div class="card" style="padding:1rem;margin-bottom:1rem"><h2 style="font-weight:600;margin:0 0 .5rem">'+title+'</h2>'+inner+'</div>'; }

// ===================== modal =====================
function openModal(title, bodyHtml, footer){
  document.getElementById('modal-root').innerHTML =
    '<div class="overlay" style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:flex;align-items:flex-end;justify-content:center" onmousedown="if(event.target===this)closeModal()">'
    +'<div class="sheet" style="background:#fff;width:100%;max-width:560px;max-height:92vh;display:flex;flex-direction:column;border-radius:1rem 1rem 0 0">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;padding:1rem;border-bottom:1px solid #e5e7eb"><h3 style="font-weight:600;margin:0">'+esc(title)+'</h3><button onclick="closeModal()" style="background:none;border:none;font-size:1.4rem;color:#9ca3af;cursor:pointer">&times;</button></div>'
    +'<div style="flex:1;overflow-y:auto;padding:1rem">'+bodyHtml+'</div>'
    +(footer?'<div style="padding:1rem;border-top:1px solid #e5e7eb">'+footer+'</div>':'')
    +'</div></div>';
}
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }

// ===================== shell / nav =====================
var NAV = [
  {view:'dashboard',label:'Dashboard',icon:'📊'},
  {view:'outlets',label:'ร้านค้า',icon:'🏪'},
  {view:'equipment',label:'อุปกรณ์',icon:'📦'},
  {view:'loans',label:'สัญญายืมอุปกรณ์',icon:'📄'},
  {view:'movements',label:'คืนอุปกรณ์',icon:'🔁'},
  {view:'audit',label:'ตรวจนับ',icon:'📋'},
  {view:'approvals',label:'อนุมัติ',icon:'✅',roles:['admin']},
  {view:'reports',label:'รายงาน',icon:'📈',roles:['admin','executive']},
  {view:'users',label:'ผู้ใช้',icon:'👤',roles:['admin']}
];
function renderShell(){
  var items = NAV.filter(function(n){ return !n.roles || n.roles.indexOf(state.user.role)>=0; });
  var nav = items.map(function(n){ return '<button class="navbtn" data-view="'+n.view+'" style="padding:.4rem .7rem;border-radius:.5rem;white-space:nowrap;font-size:.9rem;border:none;background:transparent;cursor:pointer">'+n.icon+' '+n.label+'</button>'; }).join('');
  document.getElementById('app').innerHTML =
    '<header style="position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid #e5e7eb">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;padding:.55rem 1rem">'
    +'<div style="display:flex;align-items:center;gap:.5rem"><span style="font-size:1.5rem">📦</span><b style="color:#134e4a">Equipment Management</b></div>'
    +'<div style="display:flex;align-items:center;gap:.6rem"><span style="font-size:.8rem;color:#6b7280">'+esc(state.user.full_name)+' · '+esc(L.role[state.user.role]||'')+'</span><button class="btn btn-secondary" style="min-height:auto;padding:.3rem .6rem" onclick="logout()">ออก</button></div>'
    +'</div>'
    +'<nav id="navbar" style="display:flex;gap:.25rem;overflow-x:auto;padding:0 .6rem .5rem">'+nav+'</nav>'
    +'</header>'
    +'<main id="content" style="padding:1rem;max-width:1024px;margin:0 auto;padding-bottom:3rem"></main>';
  document.getElementById('navbar').addEventListener('click',function(e){ var b=e.target.closest('.navbtn'); if(b) navigate(b.dataset.view); });
}
function navigate(view, params){ state.view=view; state.params=params||{}; state.seq=(state.seq||0)+1; if(document.getElementById('content')){ window.scrollTo(0,0); highlightNav(); (VIEWS[view]||VIEWS.dashboard)(); } }
// คืนฟังก์ชันเช็กว่า "ยังอยู่หน้าเดิม" หรือไม่ — ใช้กันคำตอบ async ที่มาช้าเขียนทับหน้าใหม่
function viewGuard(){ var s=state.seq; return function(){ return s===state.seq; }; }
function highlightNav(){ var nb=document.querySelectorAll('.navbtn'); nb.forEach(function(b){ var on=b.dataset.view===state.view; b.style.background=on?'#0f766e':'transparent'; b.style.color=on?'#fff':'#374151'; }); }

// ===================== auth =====================
VIEWS.login = function(){
  document.getElementById('app').innerHTML =
    '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem">'
    +'<div class="card" style="width:100%;max-width:360px;padding:1.5rem">'
    +'<div style="text-align:center;margin-bottom:1.25rem"><div style="font-size:2.5rem">📦</div><h1 style="font-size:1.2rem;font-weight:700;color:#134e4a;margin:.25rem 0 0">Draught Beer Equipment</h1><div style="font-size:.85rem;color:#6b7280">ยืม–คืน–ตรวจนับอุปกรณ์</div></div>'
    +'<div><label class="label">ชื่อผู้ใช้</label><input class="input" id="lg_user" autocomplete="username"></div>'
    +'<div style="margin-top:.75rem"><label class="label">รหัสผ่าน</label><input class="input" id="lg_pass" type="password" autocomplete="current-password"></div>'
    +'<div id="lg_err" style="color:#b91c1c;font-size:.85rem;margin-top:.5rem"></div>'
    +'<button class="btn btn-primary" style="width:100%;margin-top:1rem" id="lg_btn" onclick="doLogin()">เข้าสู่ระบบ</button>'
    +'</div></div>';
  document.getElementById('lg_pass').addEventListener('keydown',function(e){ if(e.key==='Enter') doLogin(); });
};
function doLogin(){
  var btn=document.getElementById('lg_btn'); btn.disabled=true; btn.textContent='กำลังเข้าสู่ระบบ...';
  api('login',{ username:val('lg_user'), password:val('lg_pass') }).then(function(r){
    state.token=r.token; state.user=r.user;
    try{ localStorage.setItem('am_token',r.token); }catch(e){}
    renderShell(); navigate('dashboard');
  }).catch(function(e){ document.getElementById('lg_err').textContent=e.message; btn.disabled=false; btn.textContent='เข้าสู่ระบบ'; });
}
function logout(){ state.token=null; state.user=null; try{ localStorage.removeItem('am_token'); }catch(e){} VIEWS.login(); }

// ===================== dashboard =====================
var _rsmOpen=null;   // RSM ที่กำลังกางอยู่ในหน้า dashboard
VIEWS.dashboard = function(){
  loading();
  _rsmOpen=null;
  var ok=viewGuard();
  api('dashboard').then(function(d){
    if(!ok()) return;
    function stat(label,v,icon){ return '<div class="card" style="padding:1rem"><div style="display:flex;justify-content:space-between"><span style="font-size:.82rem;color:#6b7280">'+label+'</span><span>'+icon+'</span></div><div style="font-size:1.5rem;font-weight:700;margin-top:.2rem">'+v+'</div></div>'; }
    function statLink(label,v,icon,rsm){ return '<div class="card rsm-box" data-rsm="'+esc(rsm)+'" onclick="toggleRsm(\''+esc(rsm)+'\')" style="padding:1rem;cursor:pointer;border-color:#99f6e4"><div style="display:flex;justify-content:space-between"><span style="font-size:.82rem;color:#6b7280">'+label+'</span><span>'+icon+'</span></div><div style="font-size:1.5rem;font-weight:700;margin-top:.2rem;color:#0f766e">'+v+'</div><div style="font-size:.7rem;color:#0f766e;margin-top:.15rem">แตะเพื่อดูรายจังหวัด ▾</div></div>'; }
    var boxes = d.rsmBoxes || [];
    function boxFor(code){ var b=boxes.filter(function(x){return String(x.rsm).toUpperCase()===code;})[0]; return b?b.shops:0; }
    var cards='<div class="dash-grid">'
      +stat('ร้านค้าทั้งหมด',fmtNum(d.outlets.total),'🏪')+stat('ร้านค้า Active',fmtNum(d.outlets.active),'🏬')
      +stat('ชนิดอุปกรณ์',fmtNum(d.equipment.types),'📦')+stat('กระจายอยู่ (Units)',fmtNum(d.equipment.deployed),'📤')
      +stat('สัญญายืมทั้งหมด',fmtNum(d.loans.total),'🗂️')+stat('รออนุมัติ',fmtNum(d.pending),'⏳')
      +stat('สัญญายืมค้างอยู่',fmtNum(d.loans.active),'📄')+stat('มูลค่ารวม',fmtBaht(d.equipment.value),'💰')
      +stat('Cooler ทั้งประเทศ',fmtNum(d.equipment.cooler),'❄️')
      +statLink('ร้านค้า BKK',fmtNum(boxFor('BKK')),'📍','BKK')
      +statLink('ร้านค้า UP1',fmtNum(boxFor('UP1')),'📍','UP1')
      +statLink('ร้านค้า UP2',fmtNum(boxFor('UP2')),'📍','UP2')
      +'</div>';
    var recent = (d.recent&&d.recent.length) ? d.recent.map(function(r){
      return '<div style="display:flex;justify-content:space-between;align-items:center;gap:.5rem;padding:.5rem 0;border-bottom:1px solid #f3f4f6"><div style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.9rem"><span style="font-weight:500">'+esc(L.logType[r.type]||r.type)+'</span> · '+esc(r.shop_name||'-')+'</div><div style="display:flex;align-items:center;gap:.5rem;flex-shrink:0"><span class="badge '+(L.logBadge[r.status]||'')+'">'+esc(L.logStatus[r.status]||r.status)+'</span><span style="font-size:.72rem;color:#9ca3af">'+fmtDate(r.ts)+'</span></div></div>';
    }).join('') : '<div style="text-align:center;color:#9ca3af;padding:1rem">ยังไม่มีกิจกรรม</div>';
    setContent('<h1 style="font-size:1.25rem;font-weight:700;margin:0 0 1rem">สวัสดี '+esc(state.user.full_name)+'</h1>'+cards
      +'<div id="rsm-panel"></div>'
      +'<div class="card" style="padding:1rem;margin-top:1rem"><h2 style="font-weight:600;margin:0 0 .5rem">กิจกรรมล่าสุด</h2>'+recent+'</div>');
  }).catch(function(e){ if(ok()) showError(e); });
};
// กาง/พับ ตาราง RSM แบบ inline ในหน้า dashboard (ไม่เด้งไปหน้าใหม่)
function highlightRsmBoxes(){
  var boxes=document.querySelectorAll('.rsm-box'); boxes.forEach(function(b){
    var on=b.dataset.rsm===_rsmOpen; b.style.background=on?'#f0fdfa':''; b.style.boxShadow=on?'0 0 0 2px #0f766e':'';
  });
}
function toggleRsm(rsm){
  var panel=document.getElementById('rsm-panel'); if(!panel) return;
  if(_rsmOpen===rsm){ _rsmOpen=null; panel.innerHTML=''; highlightRsmBoxes(); return; }
  _rsmOpen=rsm; highlightRsmBoxes();
  panel.innerHTML='<div class="card" style="padding:1rem;margin-top:1rem;color:#9ca3af">กำลังโหลดข้อมูล '+esc(rsm)+'...</div>';
  var ok=viewGuard(); var reqRsm=rsm;
  api('rsmBreakdown',{rsm:rsm}).then(function(d){
    if(!ok() || _rsmOpen!==reqRsm) return;   // เปลี่ยนหน้า/กดปุ่มอื่นแล้ว ไม่ต้องเขียนทับ
    var p2=document.getElementById('rsm-panel'); if(!p2) return;
    var t=d.totals||{shops:0,equipment:0,coolers:0};
    function cell(v){ return '<td style="padding:.5rem .4rem;text-align:right">'+fmtNum(v)+'</td>'; }
    var rows=(d.provinces||[]).map(function(p){
      return '<tr style="border-bottom:1px solid #f3f4f6"><td style="padding:.5rem .4rem">'+esc(p.province)+'</td>'+cell(p.shops)+cell(p.equipment)+cell(p.coolers)+'</tr>';
    }).join('') || '<tr><td colspan="4" style="text-align:center;color:#9ca3af;padding:1.5rem">ไม่พบข้อมูลใน RSM นี้</td></tr>';
    p2.innerHTML='<div class="card" style="padding:1rem;margin-top:1rem;border-color:#5eead4">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem"><h2 style="font-weight:700;margin:0;color:#134e4a">RSM: '+esc(d.rsm)+' — แยกตามจังหวัด</h2><button class="btn" style="background:none;color:#0f766e;min-height:auto;padding:.2rem .5rem" onclick="toggleRsm(\''+esc(d.rsm)+'\')">ปิด ✕</button></div>'
      +'<div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem">'
        +'<div style="flex:1;min-width:90px;background:#f0fdfa;border-radius:.5rem;padding:.5rem .6rem"><div style="font-size:.72rem;color:#6b7280">ร้านทั้งหมด</div><div style="font-size:1.15rem;font-weight:700">'+fmtNum(t.shops)+'</div></div>'
        +'<div style="flex:1;min-width:90px;background:#f0fdfa;border-radius:.5rem;padding:.5rem .6rem"><div style="font-size:.72rem;color:#6b7280">Equipment</div><div style="font-size:1.15rem;font-weight:700">'+fmtNum(t.equipment)+'</div></div>'
        +'<div style="flex:1;min-width:90px;background:#f0fdfa;border-radius:.5rem;padding:.5rem .6rem"><div style="font-size:.72rem;color:#6b7280">Cooler</div><div style="font-size:1.15rem;font-weight:700">'+fmtNum(t.coolers)+'</div></div>'
      +'</div>'
      +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:.9rem;min-width:380px">'
      +'<thead><tr style="border-bottom:2px solid #e5e7eb;color:#134e4a"><th style="text-align:left;padding:.5rem .4rem">จังหวัด</th><th style="text-align:right;padding:.5rem .4rem">ร้าน</th><th style="text-align:right;padding:.5rem .4rem">Equipment</th><th style="text-align:right;padding:.5rem .4rem">Cooler</th></tr></thead>'
      +'<tbody>'+rows+'</tbody></table></div></div>';
  }).catch(function(e){ var p2=document.getElementById('rsm-panel'); if(p2 && ok() && _rsmOpen===reqRsm) p2.innerHTML='<div class="card" style="padding:1rem;margin-top:1rem;color:#b91c1c">'+esc(e.message)+'</div>'; });
}

// ===================== outlets =====================
var _outletFiltersReady=false;
VIEWS.outlets = function(){
  _outletFiltersReady=false;
  setContent('<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem"><h1 style="font-size:1.25rem;font-weight:700;margin:0">ร้านค้า</h1><button class="btn btn-primary" onclick="outletForm()">+ เพิ่มร้าน</button></div>'
    +'<div style="display:flex;gap:.5rem;margin-bottom:.5rem;flex-wrap:wrap"><select class="input" id="outlet-rsm" style="flex:1;min-width:120px"><option value="">ทุก Region</option></select><select class="input" id="outlet-area" style="flex:1;min-width:120px"><option value="">ทุก Area</option></select><select class="input" id="outlet-service" style="flex:1;min-width:120px"><option value="">ทุก Service By</option></select></div>'
    +'<div style="display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap"><input class="input" id="outlet-q" placeholder="ค้นหาร้าน / System ID / Customer ID / จังหวัด" style="flex:1;min-width:200px"><select class="input" id="outlet-status" style="width:150px"><option value="">ทุก status</option><option value="active">ใช้งาน</option><option value="inactive">หยุดขาย</option><option value="close">ปิดกิจการ</option></select></div><div id="list"></div>');
  document.getElementById('outlet-q').addEventListener('input',debounce(function(){ loadOutletList(false); },400));
  document.getElementById('outlet-status').addEventListener('change',function(){ loadOutletList(false); });
  document.getElementById('outlet-rsm').addEventListener('change',function(){ loadOutletList(false); });
  document.getElementById('outlet-area').addEventListener('change',function(){ loadOutletList(false); });

VIEWS.equipment = function(){
  setContent('<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem"><h1 style="font-size:1.25rem;font-weight:700;margin:0">อุปกรณ์ (ชนิด)</h1><button class="btn btn-primary" onclick="equipForm()">+ เพิ่ม</button></div>'

var _equipCats=[];
function equipCard(a){
  return '<div class="card" onclick=\'equipForm('+JSON.stringify(a).replace(/'/g,"&#39;")+')\' style="display:flex;justify-content:space-between;align-items:center;padding:1rem;margin-bottom:.5rem;cursor:pointer"><div style="min-width:0"><div style="font-weight:500">'+esc(a.name)+'</div><div style="font-size:.85rem;color:#6b7280">'+esc(a.id)+'</div></div><div style="text-align:right;font-size:.8rem;color:#9ca3af">'+(a.value?fmtBaht(a.value):'')+'</div></div>';
}
function loadEquipList(){
  var list=document.getElementById('list'); list.innerHTML='<div style="color:#9ca3af;padding:1rem">กำลังโหลด...</div>';
  api('listEquipment',{q:val('equip-q'),pageSize:500}).then(function(res){
    _equipCats=res.categories||[];
    if(!res.rows.length){ list.innerHTML='<div style="text-align:center;color:#9ca3af;padding:2rem">ไม่พบอุปกรณ์</div>'; return; }
    // จัดกลุ่มตามหมวดหมู่ โดยเรียงตามลำดับหมวดจาก backend ก่อน
    var map={};
    res.rows.forEach(function(a){ var c=a.category||'ไม่ระบุหมวด'; (map[c]=map[c]||[]).push(a); });
    var order=(res.categories||[]).filter(function(c){ return map[c]; });
    Object.keys(map).forEach(function(c){ if(order.indexOf(c)<0) order.push(c); });
    var html=order.map(function(c){
      var items=map[c].map(equipCard).join('');
      return '<div style="margin-bottom:1rem">'
        +'<div style="position:sticky;top:0;display:flex;justify-content:space-between;align-items:center;background:#f0fdfa;color:#134e4a;font-weight:600;font-size:.92rem;padding:.5rem .75rem;border-radius:.5rem;margin-bottom:.5rem;border:1px solid #ccfbf1">'
        +'<span>'+esc(c)+'</span><span style="font-size:.78rem;color:#0f766e">'+fmtNum(map[c].length)+' รายการ</span></div>'
        +items+'</div>';
    }).join('');
    html+='<div style="text-align:center;color:#9ca3af;font-size:.78rem;padding:.5rem">รวม '+fmtNum(res.total)+' รายการ · '+order.length+' หมวด</div>';
    list.innerHTML=html;
  }).catch(function(e){ list.innerHTML='<div style="color:#b91c1c;padding:1rem">'+esc(e.message)+'</div>'; });
}
function equipForm(a){
  a=a||{};
  var cats=_equipCats.map(function(c){ return '<option value="'+esc(c)+'">'; }).join('');
  var body='<div style="display:flex;flex-direction:column;gap:.75rem">'
    +field('ชื่ออุปกรณ์ *','ef_name',a.name)
    +'<div><label class="label">หมวดหมู่</label><input class="input" id="ef_category" list="ef_cats" value="'+esc(a.category||'')+'"><datalist id="ef_cats">'+cats+'</datalist></div>'
    +field('มูลค่า (บาท)','ef_value',a.value,'number')
    +'</div>';
  openModal(a.id?'แก้ไขอุปกรณ์':'เพิ่มอุปกรณ์', body,
    '<div style="display:flex;gap:.5rem"><button class="btn btn-secondary" style="flex:1" onclick="closeModal()">ยกเลิก</button><button class="btn btn-primary" style="flex:1" onclick="saveEquip(\''+esc(a.id||'')+'\')">บันทึก</button></div>');
}
function saveEquip(id){
  var a={ name:val('ef_name'), category:val('ef_category'), value:val('ef_value') };

    '<button class="btn btn-secondary" style="margin-bottom:1rem" onclick="navigate(\'loans\')">← กลับ</button>'

    +section('3. รายละเอียด','<div style="display:flex;flex-direction:column;gap:.75rem">'+field('เงินมัดจำ (บาท)','lc_deposit','','number')+field('หมายเหตุ','lc_note','')+'</div>')

  var canvas=document.getElementById('sig'); if(!canvas) return;
  var ctx=canvas.getContext('2d'); var ratio=window.devicePixelRatio||1; var rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*ratio; canvas.height=rect.height*ratio; ctx.scale(ratio,ratio);
  ctx.lineWidth=2; ctx.lineCap='round'; ctx.strokeStyle='#111827';
  var drawing=false;
  function pos(e){ var r=canvas.getBoundingClientRect(); return { x:e.clientX-r.left, y:e.clientY-r.top }; }
  canvas.addEventListener('pointerdown',function(e){ drawing=true; var p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); canvas.setPointerCapture(e.pointerId); });
  canvas.addEventListener('pointermove',function(e){ if(!drawing) return; var p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); });
  function end(){ if(drawing){ drawing=false; lcState.signature=canvas.toDataURL('image/png'); } }
  canvas.addEventListener('pointerup',end); canvas.addEventListener('pointerleave',end);
}
function clearSig(){ var c=document.getElementById('sig'); if(c){ c.getContext('2d').clearRect(0,0,c.width,c.height); } lcState.signature=null; }

// เติมตัวเลือก filter (Region/Area/Service By) — เติมเมื่อยังว่างอยู่เท่านั้น
// ถ้า backend ไม่ส่ง list มา จะ derive จากผลลัพธ์ที่ได้เป็น fallback
function adUniqFromRows(rows,key){
  var seen={}, out=[];
  (rows||[]).forEach(function(r){ var v=r[key]; if(v!=null && String(v).trim()!=='' && !seen[v]){ seen[v]=true; out.push(v); } });
  return out.sort();
}
function adFillFilter(sel, primaryList, rows, key){
  if(!sel || sel.options.length>1) return;   // เติมไปแล้ว (มีมากกว่าตัวเลือก "ทั้งหมด")
  var list=(primaryList && primaryList.length) ? primaryList : adUniqFromRows(rows,key);
  list.forEach(function(v){ var o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); });
}

  adState.outlet=o;
  var c=document.getElementById('ad-shop');
  if(c) c.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;background:#f0fdfa;padding:.4rem .6rem;border-radius:.5rem;font-size:.9rem"><span><b>'+esc(outletName(o))+'</b> <span style="color:#6b7280">· '+esc(o.id||'')+'</span></span><button class="btn" style="background:none;color:#0f766e" onclick="adChangeShop()">เปลี่ยน</button></div>';
  adLoadHoldings();
}
function adLoadHoldings(){
  var c=document.getElementById('ad-equip'); if(!c) return;
  c.innerHTML='<div style="color:#9ca3af;font-size:.85rem">กำลังโหลดรายการอุปกรณ์...</div>'; adState.counts={};
  api('outletHoldings',{outlet_id:adState.outlet.id}).then(function(d){
    adState.holdings=d.holdings||[]; adState.categoryOrder=d.categoryOrder||[];
    // ค่าเริ่มต้น: ถือว่า "ปกติ" เท่ากับจำนวนที่ร้านมี (ผู้ตรวจปรับแก้ทีหลัง)
    adState.holdings.forEach(function(h,idx){ adState.counts[idx]={ok:h.qty,damaged:0,lost:0}; });
    adRenderHoldings();
  }).catch(function(e){ c.innerHTML='<div style="color:#b91c1c">'+esc(e.message)+'</div>'; });
}
function adRenderHoldings(){
  var c=document.getElementById('ad-equip'); if(!c) return;
  if(!adState.holdings.length){ c.innerHTML='<div style="color:#9ca3af;font-size:.85rem">ร้านนี้ไม่มีอุปกรณ์ให้ตรวจนับ</div>'; return; }
  var map={}; adState.holdings.forEach(function(h,idx){ (map[h.category]=map[h.category]||[]).push({h:h,idx:idx}); });
  var cats=(adState.categoryOrder||[]).filter(function(x){ return map[x]; });
  Object.keys(map).forEach(function(x){ if(cats.indexOf(x)<0) cats.push(x); });
  var head='<div style="display:flex;gap:.3rem;font-size:.7rem;color:#6b7280;font-weight:600;padding:.2rem .3rem;border-bottom:1px solid #e5e7eb;margin-bottom:.2rem"><span style="flex:1">SKU</span><span style="width:34px;text-align:center">มี</span><span style="width:50px;text-align:center">ปกติ</span><span style="width:50px;text-align:center">ชำรุด</span><span style="width:50px;text-align:center">สูญหาย</span></div>';
  var html=cats.map(function(cat){
    var rows=map[cat].map(function(o){
      var ct=adState.counts[o.idx]||{ok:0,damaged:0,lost:0};
      return '<div style="display:flex;gap:.3rem;align-items:center;padding:.25rem .3rem;border-bottom:1px solid #f9fafb;font-size:.82rem">'
        +'<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(o.h.name)+'</span>'
        +'<span style="width:34px;text-align:center;color:#6b7280">'+o.h.qty+'</span>'
        +'<input type="number" min="0" value="'+(ct.ok||0)+'" class="input" style="width:50px;min-height:34px;padding:.1rem .2rem;text-align:center" oninput="adSetCount('+o.idx+',\'ok\',this.value)">'
        +'<input type="number" min="0" value="'+(ct.damaged||0)+'" class="input" style="width:50px;min-height:34px;padding:.1rem .2rem;text-align:center" oninput="adSetCount('+o.idx+',\'damaged\',this.value)">'
        +'<input type="number" min="0" value="'+(ct.lost||0)+'" class="input" style="width:50px;min-height:34px;padding:.1rem .2rem;text-align:center" oninput="adSetCount('+o.idx+',\'lost\',this.value)">'
        +'</div>';
    }).join('');
    return '<div style="margin-bottom:.5rem"><div style="font-weight:600;color:#134e4a;font-size:.85rem;padding:.25rem 0">'+esc(cat)+'</div>'+rows+'</div>';
  }).join('');
  c.innerHTML=head+html;
}
function adSetCount(idx,field,v){ if(!adState.counts[idx]) adState.counts[idx]={ok:0,damaged:0,lost:0}; adState.counts[idx][field]=Math.max(0,Number(v||0)); }
function submitAudit(){
  if(!adState.outlet) return toast('กรุณาเลือกร้านค้า','error');
  if(!adState.holdings.length) return toast('ร้านนี้ไม่มีอุปกรณ์ให้ตรวจนับ','error');
  var items=adState.holdings.map(function(h,idx){
    var ct=adState.counts[idx]||{ok:0,damaged:0,lost:0};
    return { equipment_name:h.name, equipment_code:h.code||'', expected_qty:h.qty, qty_ok:Number(ct.ok||0), qty_damaged:Number(ct.damaged||0), qty_lost:Number(ct.lost||0) };
  });
  api('createAudit',{ cycle:val('audit-cycle'), outlet_id:adState.outlet.id, items:items })
    .then(function(r){ closeModal(); toast('บันทึก '+r.inserted+' รายการแล้ว','success'); loadAudit(); }).catch(function(e){ toast(e.message,'error'); });
}

// ===================== approvals =====================
VIEWS.approvals = function(){
  setContent('<h1 style="font-size:1.25rem;font-weight:700;margin:0 0 1rem">รออนุมัติ</h1><div id="list"></div>');
  loadApprovals();
};
function loadApprovals(){
  var list=document.getElementById('list'); list.innerHTML='<div style="color:#9ca3af;padding:1rem">กำลังโหลด...</div>';
  api('listMovements',{status:'pending',pageSize:100}).then(function(res){
    list.innerHTML = res.rows.length ? res.rows.map(function(m){
      return '<div class="card" style="padding:1rem;margin-bottom:.5rem"><div style="margin-bottom:.5rem"><div style="font-weight:500">'+esc(L.logType[m.type]||m.type)+' · '+esc(m.shop_name||'คลัง')+'</div><div style="font-size:.85rem;color:#6b7280">'+esc(m.items_summary||'')+'</div><div style="font-size:.75rem;color:#9ca3af">'+fmtDateTime(m.ts)+' · แจ้งโดย '+esc(m.technician||'')+'</div></div><div style="display:flex;gap:.5rem"><button class="btn btn-primary" style="flex:1" onclick="decide(\''+esc(m.id)+'\',\'approved\')">✅ อนุมัติ</button><button class="btn btn-danger" style="flex:1" onclick="decide(\''+esc(m.id)+'\',\'rejected\')">✕ ปฏิเสธ</button></div></div>';
    }).join('') : '<div class="card" style="text-align:center;color:#9ca3af;padding:2rem">ไม่มีรายการรออนุมัติ 🎉</div>';
  }).catch(function(e){ list.innerHTML='<div style="color:#b91c1c;padding:1rem">'+esc(e.message)+'</div>'; });
}
function decide(id,decision){ api('approveMovement',{id:id,decision:decision}).then(function(){ toast(decision==='approved'?'อนุมัติแล้ว':'ปฏิเสธแล้ว','success'); loadApprovals(); }).catch(function(e){ toast(e.message,'error'); }); }

// ===================== reports =====================
VIEWS.reports = function(){
  setContent('<h1 style="font-size:1.25rem;font-weight:700;margin:0 0 1rem">รายงาน & ส่งออก</h1>'
    +'<div class="card" style="padding:1rem;max-width:480px"><div style="display:flex;flex-direction:column;gap:.75rem">'
    +'<div><label class="label">ตารางข้อมูล</label><select class="input" id="rp_table"><option value="LOG">ประวัติ/สัญญายืมอุปกรณ์ (Log &amp; History)</option><option value="EQUIP">อุปกรณ์ (Equipment Master)</option><option value="OUTLETS">ร้านค้า (Outlet Master)</option><option value="EBS">อุปกรณ์ต่อร้าน (Equipment by shop)</option><option value="AUDIT">การตรวจนับ (Audit)</option></select></div>'
    +'<div style="display:flex;gap:.75rem">'+field('ตั้งแต่วันที่','rp_from','','date')+field('ถึงวันที่','rp_to','','date')+'</div>'
    +'<button class="btn btn-primary" style="width:100%" id="rp_btn" onclick="doExport()">⬇️ ดาวน์โหลด CSV</button>'
    +'<div style="font-size:.78rem;color:#9ca3af">เว้นช่วงวันที่ = ส่งออกทั้งหมด · เปิดใน Excel/Google Sheets ได้</div>'
    +'</div></div>');
};
function doExport(){
  var btn=document.getElementById('rp_btn'); btn.disabled=true; btn.textContent='กำลังสร้างไฟล์...';
  api('exportCsv',{ table:val('rp_table'), from:val('rp_from')?new Date(val('rp_from')).toISOString():'', to:val('rp_to')?new Date(val('rp_to')+'T23:59:59').toISOString():'' })
    .then(function(r){
      var blob=new Blob(['﻿'+r.csv],{type:'text/csv;charset=utf-8;'});
      var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download=r.filename;
      document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      toast('ดาวน์โหลด '+r.count+' แถวแล้ว','success');
    }).catch(function(e){ toast(e.message,'error'); })
    .then(function(){ btn.disabled=false; btn.textContent='⬇️ ดาวน์โหลด CSV'; });
}

// ===================== users (admin) =====================
VIEWS.users = function(){
  setContent('<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem"><h1 style="font-size:1.25rem;font-weight:700;margin:0">จัดการผู้ใช้</h1><button class="btn btn-primary" onclick="userForm()">+ เพิ่มผู้ใช้</button></div><div id="list"></div>');
  loadUsers();
};
function loadUsers(){
  var list=document.getElementById('list'); list.innerHTML='<div style="color:#9ca3af;padding:1rem">กำลังโหลด...</div>';
  api('listUsers').then(function(res){
    list.innerHTML = res.rows.length ? res.rows.map(function(u){
      return '<div class="card" onclick=\'userForm('+JSON.stringify(u).replace(/'/g,"&#39;")+')\' style="display:flex;justify-content:space-between;align-items:center;padding:1rem;margin-bottom:.5rem;cursor:pointer"><div style="min-width:0"><div style="font-weight:500">'+esc(u.full_name||u.username)+' <span style="color:#9ca3af;font-size:.85rem">@'+esc(u.username)+'</span></div><div style="font-size:.8rem;color:#6b7280">'+esc(u.id)+' · '+esc(L.role[u.role]||u.role)+'</div></div><span class="badge '+(u.active?'bg-green-100 text-green-800':'bg-gray-100 text-gray-600')+'">'+(u.active?'ใช้งาน':'ปิด')+'</span></div>';
    }).join('') : '<div style="text-align:center;color:#9ca3af;padding:2rem">ยังไม่มีผู้ใช้</div>';
  }).catch(function(e){ list.innerHTML='<div style="color:#b91c1c;padding:1rem">'+esc(e.message)+'</div>'; });
}
function userForm(u){
  u=u||{};
  var isEdit=!!u.id;
  var roleOpts=['technician','admin','executive'].map(function(r){ return '<option value="'+r+'"'+(u.role===r?' selected':'')+'>'+L.role[r]+'</option>'; }).join('');
  var body='<div style="display:flex;flex-direction:column;gap:.75rem">'
    +field('ชื่อผู้ใช้ (username) *','uf_username',u.username)
    +field('ชื่อ-สกุล','uf_fullname',u.full_name)
    +'<div><label class="label">บทบาท</label><select class="input" id="uf_role">'+roleOpts+'</select></div>'
    +'<div><label class="label">สถานะ</label><select class="input" id="uf_active"><option value="true"'+(u.active!==false?' selected':'')+'>ใช้งาน</option><option value="false"'+(u.active===false?' selected':'')+'>ปิดบัญชี</option></select></div>'
    +'<div><label class="label">'+(isEdit?'รหัสผ่านใหม่ (เว้นว่าง = ไม่เปลี่ยน)':'รหัสผ่าน *')+'</label><input class="input" id="uf_password" type="text" autocomplete="new-password" placeholder="'+(isEdit?'เว้นว่างถ้าไม่เปลี่ยน':'กำหนดรหัสผ่าน')+'"></div>'
    +'</div>';
  openModal(isEdit?'แก้ไขผู้ใช้':'เพิ่มผู้ใช้', body,
    '<div style="display:flex;gap:.5rem"><button class="btn btn-secondary" style="flex:1" onclick="closeModal()">ยกเลิก</button><button class="btn btn-primary" style="flex:1" onclick="saveUser(\''+esc(u.id||'')+'\')">บันทึก</button></div>');
}
function saveUser(id){
  var u={ username:val('uf_username'), full_name:val('uf_fullname'), role:val('uf_role'), active:val('uf_active')==='true' };
  if(id) u.id=id;
  var pw=val('uf_password'); if(pw) u.password=pw;
  if(!u.username) return toast('กรุณากรอกชื่อผู้ใช้','error');
  if(!id && !pw) return toast('กรุณากำหนดรหัสผ่าน','error');
  api('upsertUser',{user:u}).then(function(){ closeModal(); toast('บันทึกแล้ว','success'); loadUsers(); }).catch(function(e){ toast(e.message,'error'); });
}

// ===================== boot =====================
function boot(){
  if(state.token){
    api('me').then(function(u){ state.user=u; renderShell(); navigate('dashboard'); })
      .catch(function(){ state.token=null; try{localStorage.removeItem('am_token');}catch(e){} VIEWS.login(); });
  } else { VIEWS.login(); }
}
boot();
</script>
